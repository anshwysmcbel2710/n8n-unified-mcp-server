name = "n8n-unified-mcp-server"
main = "main.py"
compatibility_date = "2024-04-03"
compatibility_flags = ["python_workers"]

[vars]
# ── Logging & Monitoring ──
LOG_LEVEL = "INFO"
LOG_FORMAT = "json"

# ── Transport & Protocol ──
TRANSPORT = "sse"
STATELESS_HTTP = "true"
JSON_RESPONSE = "true"

# ── Security & Access ──
# Note: Keep N8N_API_KEY and MCP_BEARER_TOKEN in the Dashboard Secrets for safety
CORS_ORIGINS = '["vscode-webview://", "http://localhost"]'

# ── Connectivity ──
N8N_BASE_URL = "https://adriana-racemed-legislatively.ngrok-free.dev"
